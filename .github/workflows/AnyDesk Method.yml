name: AnyDesk

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      ANYDESK_PASS: Pass@1234
      RUNTIME_MINUTES: 180

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          Write-Host "Purging pre-installed desktop icons and non-essential software..."
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) {
              if (Test-Path "$publicDesktop\$target") { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }
              if (Test-Path "$userDesktop\$target") { Remove-Item "$userDesktop\$target" -Force -ErrorAction SilentlyContinue }
          }

      - name: Download and Force Install AnyDesk
        run: |
          $url = "https://download.anydesk.com/AnyDesk.exe"
          $dst = "$env:TEMP\AnyDesk.exe"
          Invoke-WebRequest -Uri $url -OutFile $dst
          
          $installDir = "C:\Program Files (x86)\AnyDesk"
          if (-not (Test-Path $installDir)) { New-Item -ItemType Directory -Path $installDir -Force | Out-Null }

          Start-Process $dst -ArgumentList "--install `"$installDir`"", "--silent", "--start-with-win" -Wait
          Start-Sleep -Seconds 5
          Remove-Item $dst -ErrorAction SilentlyContinue

      - name: Configure Unattended Access Password & Force Enable Touch Injection
        run: |
          $ad = "C:\Program Files (x86)\AnyDesk\AnyDesk.exe"
          if (-not (Test-Path $ad)) { $ad = "C:\Program Files\AnyDesk\AnyDesk.exe" }
          
          cmd.exe /c "echo ${{ env.ANYDESK_PASS }} | `"$ad`" --set-password"
          
          # Force Windows to allow UI Automation and Touch Injection over RDP layers
          New-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableUIADesktopToggle" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          
          # Unblock Touch Remote/Tablet Mode restrictions in Remote Desktop Services
          $tsPath = "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations"
          New-ItemProperty -Path $tsPath -Name "TouchMode" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          New-ItemProperty -Path $tsPath -Name "EnableTouchInjection" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          
          $path = "HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced"
          Set-ItemProperty -Path $path -Name "TaskbarGlomLevel" -Value 0 -ErrorAction SilentlyContinue
          
          Start-Process -FilePath $ad -ArgumentList "--restart-service" -Wait
          Start-Sleep -Seconds 5

      - name: Minimize Running Infrastructure Windows
        run: |
          Write-Host "Sending active command prompt windows to the taskbar tray..."
          $shell = New-Object -ComObject Shell.Application
          $shell.MinimizeAll()

      - name: Optimize Resolution for Mobile Display
        run: |
          Write-Host "Forcing resolution calibration matrix..."
          Set-DisplayResolution -Width 1600 -Height 1200 -Force -ErrorAction SilentlyContinue

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Write-Host "Fetching consumer-stable Opera GX Core..."
          $url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          
          # 1. Install browser silently
          Start-Process -FilePath $installer -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0", "--desktopshortcut=1" -Wait
          Start-Sleep -Seconds 5

          $operaExe = "$env:ProgramFiles\Opera GX\opera.exe"
          if (-not (Test-Path $operaExe)) { $operaExe = "$env:ProgramFiles (x86)\Opera GX\opera.exe" }

          # 2. Launch normally to let it generate pristine profile base and backup structures
          Write-Host "Launching clean engine layer to initialize workspace profiles..."
          Start-Process -FilePath $operaExe -ArgumentList "--no-first-run"
          Start-Sleep -Seconds 15

          # 3. Force stop browser to release file handles entirely
          Write-Host "Halting engine layer..."
          Stop-Process -Name "opera" -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 5

          # 4. Target profile configurations
          $profileDir = "$env:APPDATA\Opera Software\Opera GX Stable\Default"
          $prefPath = "$profileDir\Preferences"
          $backupPath = "$profileDir\Preferences.backup"

          if (Test-Path $prefPath) {
              Write-Host "Natively generated Preferences found. Injecting GxRewards and Auto-VPN nodes..."
              $configObj = Get-Content $prefPath -Raw | ConvertFrom-Json

              # === LAYER 1: GxRewards Sidebar Panel ===
              if (-not $configObj.ui) { $configObj | Add-Member -MemberType NoteProperty -Name "ui" -Value (New-Object PSObject) }
              if (-not $configObj.ui.browser) { $configObj.ui | Add-Member -MemberType NoteProperty -Name "browser" -Value (New-Object PSObject) }
              if (-not $configObj.ui.browser.sidebar) { $configObj.ui.browser | Add-Member -MemberType NoteProperty -Name "sidebar" -Value (New-Object PSObject) }
              if (-not $configObj.ui.browser.sidebar.item_prefs) { $configObj.ui.browser.sidebar | Add-Member -MemberType NoteProperty -Name "item_prefs" -Value (New-Object PSObject) }
              if (-not $configObj.ui.browser.sidebar.item_prefs.visibility) { $configObj.ui.browser.sidebar.item_prefs | Add-Member -MemberType NoteProperty -Name "visibility" -Value (New-Object PSObject) }
              
              if ($configObj.ui.browser.sidebar.item_prefs.visibility.GxRewards -eq $null) {
                  $configObj.ui.browser.sidebar.item_prefs.visibility | Add-Member -MemberType NoteProperty -Name "GxRewards" -Value $true -Force
              } else {
                  $configObj.ui.browser.sidebar.item_prefs.visibility.GxRewards = $true
              }

              # === LAYER 2: Root Visibility Node ===
              if (-not $configObj.ui.visibility) { $configObj.ui | Add-Member -MemberType NoteProperty -Name "visibility" -Value (New-Object PSObject) }
              
              if ($configObj.ui.visibility.GxRewards -eq $null) {
                  $configObj.ui.visibility | Add-Member -MemberType NoteProperty -Name "GxRewards" -Value $true -Force
              } else {
                  $configObj.ui.visibility.GxRewards = $true
              }

              # === LAYER 3: Native Built-in VPN Engine Injection ===
              if (-not $configObj.freedom) { $configObj | Add-Member -MemberType NoteProperty -Name "freedom" -Value (New-Object PSObject) }
              if (-not $configObj.freedom.proxy_switcher) { $configObj.freedom | Add-Member -MemberType NoteProperty -Name "proxy_switcher" -Value (New-Object PSObject) }
              
              # Force proxy engine layers online to slip past anti-bot monitoring
              if ($configObj.freedom.proxy_switcher.enabled -eq $null) {
                  $configObj.freedom.proxy_switcher | Add-Member -MemberType NoteProperty -Name "enabled" -Value $true -Force
              } else {
                  $configObj.freedom.proxy_switcher.enabled = $true
              }
              
              if ($configObj.freedom.proxy_switcher.ui_visible -eq $null) {
                  $configObj.freedom.proxy_switcher | Add-Member -MemberType NoteProperty -Name "ui_visible" -Value $true -Force
              } else {
                  $configObj.freedom.proxy_switcher.ui_visible = $true
              }

              $finalJson = $configObj | ConvertTo-Json -Depth 100 -Compress

              # Clear out the un-mutated files cleanly
              Remove-Item $prefPath -Force -ErrorAction SilentlyContinue
              Remove-Item $backupPath -Force -ErrorAction SilentlyContinue

              # Flush the exact identical true configuration strings directly into place
              Set-Content -Path $prefPath -Value $finalJson -Force
              Set-Content -Path $backupPath -Value $finalJson -Force

              # 5. FORCE READ-ONLY FILE ATTRIBUTES AT SYSTEM LAYER
              Write-Host "Locking profiles to Read-Only to bypass engine self-healing validation..."
              Set-ItemProperty -Path $prefPath -Name IsReadOnly -Value $true
              Set-ItemProperty -Path $backupPath -Name IsReadOnly -Value $true
              Write-Host "Files successfully written and protected with VPN auto-start enabled."
          } else {
              Write-Warning "Target preferences file initialization timeout encountered."
          }
          
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          
          if (Test-Path "$userDesktop\Opera GX.lnk") {
              Move-Item -Path "$userDesktop\Opera GX.lnk" -Destination $publicDesktop -Force -ErrorAction SilentlyContinue
          }

          Write-Host "Configuring explicit launcher shortcut with forced promo link..."
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("$publicDesktop\Opera GX Browser.lnk")
          $Shortcut.TargetPath = $operaExe
          $Shortcut.Arguments = "https://www.opera.com/gx/forsaken --no-first-run"
          $Shortcut.Save()
          
          Write-Host "Sequence finished. Workspace deployed."

      - name: Fetch and Display AnyDesk Connection Address
        run: |
          $confPath = "C:\ProgramData\AnyDesk\system.conf"
          $cleanId = ""
          
          for ($i = 1; $i -le 10; $i++) {
              if (Test-Path $confPath) {
                  $content = Get-Content $confPath -Raw
                  if ($content -match 'ad\.anynet\.id=(\d+)') {
                      $cleanId = $Matches[1]
                      break
                  }
              }
              Start-Sleep -Seconds 4
          }
          
          $ESC = [char]27
          $Green = "$ESC[32m"
          $Yellow = "$ESC[33m"
          $Red = "$ESC[31m"
          $Reset = "$ESC[0m"
          
          Write-Host "${Green}====================================================${Reset}"
          Write-Host "${Green}        ANYDESK CLOUD MACHINE IS READY TO CONNECT     ${Reset}"
          Write-Host "${Green}====================================================${Reset}"
          Write-Host "${Yellow} CONNECTION ID : ${Red}${cleanId}${Reset}"
          Write-Host "${Yellow} PASSWORD      : ${Red}${{ env.ANYDESK_PASS }}${Reset}"
          Write-Host "${Green}====================================================${Reset}"

      - name: Keep alive
        run: |
          $mins = [int]"${{ env.RUNTIME_MINUTES }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host ("Cloud PC Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " | Active until " + $end.ToString("HH:mm:ss"))
            Start-Sleep -Seconds 60
          }
