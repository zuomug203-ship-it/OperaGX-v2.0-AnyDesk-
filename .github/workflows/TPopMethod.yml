name: Cloud PC + Web Browser Link + Opera GX (Tunnel Persistence Fix)

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190
    env:
      VNC_PASS: Pass1234
      RUNTIME_MINUTES: 180

    steps:
      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }

      - name: Force Full HD Resolution
        run: Set-DisplayResolution -Width 1920 -Height 1080 -Force

      - name: Install and Configure TightVNC Server
        run: |
          Invoke-WebRequest -Uri "https://www.tightvnc.com/download/2.8.84/tightvnc-2.8.84-gpl-setup-64bit.msi" -OutFile "$env:TEMP\tightvnc.msi"
          Start-Process msiexec.exe -ArgumentList "/i `"$env:TEMP\tightvnc.msi`" /quiet /qn SERVER_REGISTER_AS_SERVICE=1 SET_PASSWORD=1 VALUE_PASSWORD=${{ env.VNC_PASS }} SET_VIEWONLY_PASSWORD=1 VALUE_VIEWONLY_PASSWORD=${{ env.VNC_PASS }}" -Wait

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Invoke-WebRequest -Uri "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx" -OutFile "$env:TEMP\OperaGXSetup.exe"
          Start-Process -FilePath "$env:TEMP\OperaGXSetup.exe" -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0" -Wait

      - name: Deploy Bridge & Secure Tunnel Engine
        run: |
          npm install -g websockify --silent
          New-Item -ItemType Directory -Path "C:\noVNC" -Force
          Invoke-WebRequest -Uri "https://github.com/novnc/noVNC/archive/refs/tags/v1.5.0.zip" -OutFile "novnc.zip"
          Expand-Archive -Path "novnc.zip" -DestinationPath "C:\noVNC" -Force
          Copy-Item -Path "C:\noVNC\noVNC-1.5.0\*" -Destination "C:\noVNC" -Recurse -Force
          Invoke-WebRequest -Uri "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe" -OutFile "tunnel.exe"

      - name: Launch Persistent HTTP Web Matrix
        run: |
          Write-Host "Starting standard web server frame on port 8080..."
          # Uses the native Python system pre-baked in windows-latest images to serve noVNC index files safely
          Start-Process python -ArgumentList "-m http.server 8080 --directory C:\noVNC"
          
          Write-Host "Starting Websockify on backend port 6080..."
          Start-Process websockify -ArgumentList "6080 localhost:5900"
          
          Write-Host "Verifying port handshakes are live..."
          $retries = 0
          while (-not (Test-NetConnection -ComputerName 127.0.0.1 -Port 8080).TcpTestSucceeded -and $retries -lt 15) {
              Start-Sleep -Seconds 2
              $retries++
          }

      - name: Configure and Establish Persistent Cloudflare Edge Tunnel
        run: |
          Write-Host "Writing local config profile rules..."
          # Creating an explicit ingress configuration map blocks the edge server from unregistering the URL route
          $ConfigContent = @"
          ingress:
            - hostname: "*"
              service: http://127.0.0.1:8080
            - service: http_status:404
          "@
          Out-File -FilePath "config.yml" -InputObject $ConfigContent -Encoding ascii
          
          Write-Host "Starting secure tunnel process via config profile rules..."
          $LogFile = "$env:TEMP\tunnel.log"
          Start-Process .\tunnel.exe -ArgumentList "tunnel", "--config", "config.yml" -RedirectStandardError $LogFile
          Start-Sleep -Seconds 12
          
          $WebLink = (Get-Content $LogFile -Raw) | Select-String -Pattern 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' | Select-Object -ExpandProperty Matches | Select-Object -ExpandProperty Value -First 1
          if ($WebLink) {
              $FinalUrl = $WebLink + "/vnc.html"
              Write-Host "===================================================="
              Write-Host "      WEB-BROWSER CLOUD PC IS READY TO CONNECT       "
              Write-Host "===================================================="
              Write-Host " CLICK LINK: $FinalUrl"
              Write-Host " PASSWORD  : ${{ env.VNC_PASS }}"
              Write-Host "===================================================="
          } else {
              Write-Error "CRITICAL: Cloudflare failed to register the tunnel configuration rules."
          }

      - name: Keep alive
        run: Start-Sleep -Seconds 10000
